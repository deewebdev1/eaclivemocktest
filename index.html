<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EAC Post-UTME Mock Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.05) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(26,26,46,0.8) 0%, transparent 50%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(255,107,53,0.08);
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,107,53,0.1);
      border: 2px solid rgba(255,107,53,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      stroke: #ff6b35;
    }

    .logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin: 0 auto 8px;
      display: block;
    }

    .badge {
      display: inline-block;
      background: rgba(255,107,53,0.12);
      color: #ff6b35;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    p {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #ff6b35, transparent);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 12px;
      text-align: left;
    }

    .info-row svg {
      width: 18px;
      height: 18px;
      stroke: #ff6b35;
      flex-shrink: 0;
    }

    .info-row span {
      color: rgba(255,255,255,0.6);
      font-size: 13.5px;
    }

    .footer {
      margin-top: 36px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
    }

    .footer strong {
      color: #ff6b35;
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="card">
    <img src="./logo.png" alt="EAC Logo" class="logo" />

    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
      </svg>
    </div>

    <div class="badge">Portal Closed</div>

    <h1>This Portal Has Expired</h1>

    <div class="divider"></div>

    <p>The EAC Post-UTME Mock Test portal is no longer accepting submissions. The examination window has closed.</p>

    <div class="info-row">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>
      </svg>
      <span>Examination window is now closed</span>
    </div>

    <div class="info-row">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 6.75Z"/>
      </svg>
      <span>Contact EAC for further information</span>
    </div>

    <div class="footer">
      &copy; 2026 <strong>EAC Services Ltd.</strong> All rights reserved.
    </div>
  </div>
</body>
</html>
